<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1d23">
    <title>Med Basha v103.3.7</title>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyCLi_wlkO5zB52s6Kegc6ANZVeH6mHP5DY", authDomain: "misturnos-fe3ea.firebaseapp.com", projectId: "misturnos-fe3ea", storageBucket: "misturnos-fe3ea.firebasestorage.app", messagingSenderId: "1029095925443", appId: "1:1029095925443:web:873240d85ac5160f392476" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        const userDoc = doc(db, "usuarios", "conductor_menorca", "datos", "history");
        window.cloudSave = async (data) => { try { await setDoc(userDoc, { payload: data, lastUpdate: new Date().toISOString() }); } catch (e) { console.error(e); } };
        window.setupSync = (callback) => { onSnapshot(userDoc, (docSnap) => { if (docSnap.exists()) callback(docSnap.data().payload); }); };
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
    
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #1a1d23; color: #e2e8f0; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
        .card-main { background: #23272e; border-radius: 1rem; border: 1px solid #2d333f; padding: 12px; }
        .block-hora { background-color: #1e293b; padding: 8px; border-radius: 10px; flex: 1; position: relative; }
        input { background: transparent; border: none; color: white; font-weight: 900; outline: none; width: 100%; text-align: center; }
        input[type="time"] { font-size: 1.9rem; color: #60a5fa; }
        input[type="number"] { font-size: 1.7rem; color: #22d3ee; }
        .label-small { font-size: 11px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .fixed-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: #1a1d23; padding: 12px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.1); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        
        /* Estilos para Interruptores */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #334155; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #3b82f6; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body x-data="tmsaApp()" x-init="initApp()" class="flex flex-col" :style="'background-color:' + config.bgGeneral + '; font-size:' + config.fontSize">

    <template x-if="screen === 1">
        <main class="p-3 space-y-3 flex flex-col h-full overflow-hidden" x-transition>
            <div class="flex justify-between items-center">
                <div><h1 class="text-xl font-black text-white" :style="'color:' + config.txtHighlight">Med. Basha</h1><p class="label-small">v103.3.7</p></div>
                <div class="flex gap-2">
                    <button @click="screen = 4" class="bg-gray-700/50 p-2 rounded-lg" :style="'border: 1px solid ' + config.borderCard"><span class="material-symbols-outlined text-xl text-white">settings</span></button>

                    <button @click="screen = 3" class="bg-blue-600 p-2 rounded-lg shadow-lg"><span class="material-symbols-outlined text-xl">analytics</span></button>

            <div class="card-main" :style="'background:' + config.bgCard + '; border-color:' + config.borderCard">

                    </div>

                        <span class="text-xs font-bold text-gray-300">06:00 - 15:00 (Ficha A+)</span>

    <script>
        function tmsaApp() {
            return {
                screen: 1, fechaSeleccionada: new Date().toISOString().split('T')[0], currentTime: '',
                form: { esPartida: false, bus1: '', bus2: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', kmI2: '', kmF2: '', comida: 'NO', cena: 'NO' },
                res: { total: '00:00', kmTotales: 0, noctH: 0 },
                history: [], mes: new Date().getMonth(), año: new Date().getFullYear(), mesNombre: '', 
                totalMesH: 0, totalMesD: 0, totalMesN: 0, totalMesK: 0,
                urlSheets: "https://script.google.com/macros/s/AKfycbzpQuJ5O7S1zXw4FDSRcFqESzslF7SbZwNnPxTWfAjO2bXgfBL5yrA_XBuAV5u8P0763A/exec",

                config: {
                    bgGeneral: '#1a1d23', bgCard: '#23272e', borderCard: '#2d333f', bgInput: '#1e293b',
                    txtHighlight: '#60a5fa', txtReloj: '#ffffff', txtInput: '#60a5fa', fontSize: '14px',
                    fichaA: false, fichaAplus: true, fichaB: true, fichaC: false,
                    mantenerBorradores: true, avisoBus: true
                },

                initApp() {
                    const savedConfig = localStorage.getItem('tmsa_config_v103');
                    if(savedConfig) this.config = Object.assign(this.config, JSON.parse(savedConfig));
                    this.history = JSON.parse(localStorage.getItem('tmsa_history_v98') || '[]');
                    this.renderCalendario(); this.updateClock(); setInterval(() => this.updateClock(), 1000);
                    window.setupSync((d) => { if(d){ this.history = d; this.renderCalendario(); }});
                },

                saveSettings() { localStorage.setItem('tmsa_config_v103', JSON.stringify(this.config)); },
                resetConfig() { if(confirm("¿Restaurar ajustes?")) { localStorage.removeItem('tmsa_config_v103'); location.reload(); }},
                updateClock() { const now = new Date(); this.currentTime = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0'); },
                
                abrirCalendarioConAlarma() { 
                    if(!this.form.horaE1) { alert("⚠️ Pon inicio"); return; }
                    let [h, m] = this.form.horaE1.split(':').map(Number);
                    let fechaBase = new Date(this.fechaSeleccionada);
                    fechaBase.setHours(h, m, 0, 0);
                    let unaHoraAntes = new Date(fechaBase.getTime() - 3600000);
                    const pad = (n) => String(n).padStart(2, '0');
                    let fIso = unaHoraAntes.getFullYear() + pad(unaHoraAntes.getMonth() + 1) + pad(unaHoraAntes.getDate()) + "T" + pad(unaHoraAntes.getHours()) + pad(unaHoraAntes.getMinutes()) + "00";
                    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=ALMA+BUS+${this.form.bus1}&dates=${fIso}/${fIso}`, '_blank');
                },

                abrirGoogleSheets() { window.open(this.urlSheets, '_blank'); },
                
                calcularTodo() {
                    const parseTime = (t) => { if(!t) return null; let [h,m]=t.split(':').map(Number); return h*60+m; };
                    let tE1 = parseTime(this.form.horaE1), tS1 = parseTime(this.form.horaS1);
                    let tE2 = parseTime(this.form.horaE2), tS2 = parseTime(this.form.horaS2);
                    let totalMin = ((tS1 !== null && tE1 !== null) ? (tS1 <= tE1 ? (tS1+1440)-tE1 : tS1-tE1) : 0) + 
                                   ((this.form.esPartida && tS2 !== null && tE2 !== null) ? (tS2 <= tE2 ? (tS2+1440)-tE2 : tS2-tE2) : 0);
                    let minCalculado = (totalMin < 360 && totalMin > 0) ? 360 : totalMin;
                    this.res.total = Math.floor(minCalculado/60).toString().padStart(2,'0') + ":" + Math.round(minCalculado%60).toString().padStart(2,'0');
                    let hTotalReal = totalMin / 60;
                    let hIniReal = this.form.horaE1;
                    let hFinUltima = (this.form.esPartida && this.form.horaS2) ? this.form.horaS2 : this.form.horaS1;
                    
                    if(this.form.comida !== 'DUDA') {
                        let cumpleComida = (hTotalReal >= 6 && hFinUltima >= "15:00" && this.config.fichaAplus);
                        if(hFinUltima === "14:30" && !this.config.fichaA) cumpleComida = false;
                        this.form.comida = cumpleComida ? "SI" : "NO";
                    }
                    if(this.form.cena !== 'DUDA' && this.form.cena !== 'SI') {
                        if (hFinUltima >= "23:00" && this.config.fichaB) this.form.cena = "SI";
                        else if (hFinUltima >= "22:45") this.form.cena = "DUDA";
                        else this.form.cena = "NO";
                        if (hFinUltima === "23:00" && !this.config.fichaC && hIniReal === "13:00") this.form.cena = "NO";
                    }
                    this.res.kmTotales = (parseInt(this.form.kmF1)-parseInt(this.form.kmI1) || 0) + (this.form.esPartida ? (parseInt(this.form.kmF2)-parseInt(this.form.kmI2) || 0) : 0);
                    this.res.noctH = (this.calcNoct(this.form.horaE1, this.form.horaS1) + (this.form.esPartida ? this.calcNoct(this.form.horaE2, this.form.horaS2) : 0)).toFixed(2);
                },

                calcNoct(ini, fin) { if(!ini || !fin) return 0; let mN = 0; let [hE,mE] = ini.split(':').map(Number); let [hS,mS] = fin.split(':').map(Number); let cur = new Date(2000,0,1,hE,mE); let end = new Date(2000,0,1,hS,mS); if(end <= cur) end.setDate(end.getDate()+1); while(cur < end) { if(cur.getHours() >= 22 || cur.getHours() < 6) mN++; cur.setMinutes(cur.getMinutes()+1); } return mN/60; },
                estadoJornada(f) { const day = this.history.find(i => i.fecha === f); return day ? day.tipo : null; },
                tieneBorrador(f) { const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v103') || '{}'); return saved[f] ? true : false; },

                get historyByWeeks() {
                    const mesSel = `${this.año}-${String(this.mes+1).padStart(2,'0')}`;
                    let f = this.history.filter(i => i.fecha.startsWith(mesSel)).sort((a,b) => a.fecha.localeCompare(b.fecha));
                    let w = {}; this.totalMesH = 0; this.totalMesD = 0; this.totalMesN = 0; this.totalMesK = 0;
                    f.forEach(item => {
                        let d = new Date(item.fecha);
                        let target = new Date(d.valueOf());
                        let dayNr = (d.getDay() + 6) % 7; 
                        target.setDate(target.getDate() - dayNr + 3);
                        let firstThursday = target.valueOf();
                        target.setMonth(0, 1);
                        if (target.getDay() !== 4) target.setMonth(0, 1 + ((4 - target.getDay()) + 7) % 7);
                        let wk = 1 + Math.ceil((firstThursday - target) / 604800000);
                        if (!w[wk]) w[wk] = { num: wk, dias: [], totalH: 0, totalD: 0, totalN: 0, totalK: 0 };
                        w[wk].dias.push(item); 
                        let [h,m] = item.hStr.split(':').map(Number);
                        let hDec = (h + m/60);
                        w[wk].totalH += hDec; 
                        w[wk].totalD += (item.dieta !== 'DUDA' ? parseInt(item.dieta || 0) : 0);
                        this.totalMesH += hDec; 
                        if(item.dieta !== 'DUDA') this.totalMesD += parseInt(item.dieta || 0);
                    });
                    this.totalMesH = parseFloat(this.totalMesH).toFixed(2);
                    return Object.values(w).sort((a,b) => b.num - a.num);
                },

                cambiarMes(v) { this.mes += v; if(this.mes<0){this.mes=11;this.año--} if(this.mes>11){this.mes=0;this.año++} this.renderCalendario(); },
                estiloBoton(e) { if(e === 'SI') return 'bg-green-600 border-green-400 text-white'; if(e === 'DUDA') return 'bg-yellow-600 animate-pulse text-white'; return 'bg-gray-800 border-gray-700 text-gray-500'; },
                toggleDiet(t) { if(this.form[t] === 'NO') this.form[t] = 'SI'; else if(this.form[t] === 'SI') this.form[t] = 'DUDA'; else this.form[t] = 'NO'; this.saveDraft(); },
                renderCalendario() { const days = new Date(this.año, this.mes + 1, 0).getDate(); this.mesNombre = new Intl.DateTimeFormat('es-ES', { month: 'long' }).format(new Date(this.año, this.mes)); this.diasCalendario = []; for(let i=1; i<=days; i++) { let f = `${this.año}-${String(this.mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`; this.diasCalendario.push({ num: i, fecha: f, isHoy: f === new Date().toISOString().split('T')[0] }); } },
                seleccionarDia(f) { this.fechaSeleccionada = f; const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v103') || '{}'); this.form = saved[this.fechaSeleccionada] || { esPartida: false, bus1: '', bus2: '', horaE1: '', horaS1: '', kmI1: '', kmF1: '', horaE2: '', horaS2: '', kmI2: '', kmF2: '', comida: 'NO', cena: 'NO' }; this.calcularTodo(); this.screen = 2; },
                abrirRegistro(partida) { this.form.esPartida = partida; this.screen = 2; },
                saveDraft() { if(!this.config.mantenerBorradores) return; const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v103') || '{}'); saved[this.fechaSeleccionada] = this.form; localStorage.setItem('tmsa_drafts_v103', JSON.stringify(saved)); },
                
                salirRegistro() {
                    if(!this.config.mantenerBorradores) {
                        const saved = JSON.parse(localStorage.getItem('tmsa_drafts_v103') || '{}');
                        delete saved[this.fechaSeleccionada];
                        localStorage.setItem('tmsa_drafts_v103', JSON.stringify(saved));
                    }
                    this.screen = 1;
                },

                guardarJornada() { 
                    if (this.config.avisoBus && !this.form.bus1) { alert("⚠️ SUPERVISOR: ¡Falta BUS!"); return; } 
                    this.history = this.history.filter(i => i.fecha !== this.fechaSeleccionada); 
                    const dietaValor = (this.form.comida === 'DUDA' || this.form.cena === 'DUDA') ? 'DUDA' : (this.form.comida === 'SI' ? 1 : 0) + (this.form.cena === 'SI' ? 1 : 0);
                    this.history.push({ fecha: this.fechaSeleccionada, bus: this.form.esPartida && this.form.bus2 ? `${this.form.bus1}/${this.form.bus2}` : this.form.bus1, hStr: this.res.total, dieta: dietaValor, km: this.res.kmTotales, noctH: this.res.noctH, tipo: this.form.esPartida ? 'partida' : 'continua' }); 
                    localStorage.setItem('tmsa_history_v98', JSON.stringify(this.history)); window.cloudSave(this.history); alert("✅ Guardado"); this.screen = 3; 
                },
                generarPDF() { html2pdf().from(document.getElementById('capture-area')).save('Resumen_TMSA.pdf'); },
                enviarWhatsapp() { const t = `🚌 *TMSA ${this.mesNombre}*\n⌚ ${this.totalMesH}h | 🍽️ ${this.totalMesD} dietas`; window.open(`https://wa.me/?text=${encodeURIComponent(t)}`, '_blank'); }
            }
        }
    </script>
